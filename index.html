<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>2026 世界杯预测</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f6f8;
      --panel: #ffffff;
      --ink: #18202b;
      --muted: #687386;
      --line: #dde3ec;
      --brand: #0f766e;
      --brand-soft: #e0f2f1;
      --gold: #b7791f;
      --gold-soft: #fff3d6;
      --red: #b42318;
      --red-soft: #fee4e2;
      --blue: #2563eb;
      --blue-soft: #dbeafe;
      --nav-h: 68px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; background: var(--bg); color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      letter-spacing: 0;
    }
    button { font: inherit; }
    .phone-shell {
      width: min(100%, 430px); min-height: 100vh; margin: 0 auto; background: var(--bg);
      padding-bottom: calc(var(--nav-h) + env(safe-area-inset-bottom) + 18px);
    }
    .topbar {
      position: sticky; top: 0; z-index: 5; padding: 16px 16px 10px;
      background: rgba(244, 246, 248, 0.96); backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(221, 227, 236, 0.7);
    }
    .brand-row {
      display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 14px;
    }
    .brand-mark {
      display: grid; place-items: center; width: 36px; height: 36px; border-radius: 8px;
      background: var(--ink); color: #fff; font-weight: 800; font-size: 13px;
    }
    .brand-copy { min-width: 0; flex: 1; }
    .brand-copy h1 { margin: 0; font-size: 19px; line-height: 1.25; }
    .brand-copy p { margin: 3px 0 0; color: var(--muted); font-size: 12px; line-height: 1.4; }
    .live-chip {
      flex: 0 0 auto; display: inline-flex; align-items: center; gap: 6px;
      min-height: 28px; padding: 0 9px; border: 1px solid var(--line); border-radius: 999px;
      background: var(--panel); color: var(--red); font-size: 12px; font-weight: 700;
    }
    .live-dot { width: 7px; height: 7px; border-radius: 999px; background: var(--red); }
    .date-strip {
      display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; touch-action: pan-y;
    }
    .date-pill {
      min-width: 0; border: 1px solid var(--line); border-radius: 8px; background: var(--panel);
      color: var(--muted); padding: 9px 6px; text-align: center; cursor: pointer;
    }
    .date-pill strong, .date-pill span {
      display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .date-pill strong { color: inherit; font-size: 14px; line-height: 1.2; }
    .date-pill span { margin-top: 3px; font-size: 11px; line-height: 1.2; }
    .date-pill.active {
      background: var(--brand); border-color: var(--brand); color: #fff;
      box-shadow: 0 8px 18px rgba(15, 118, 110, 0.22);
    }
    main { padding: 14px 14px 0; }
    .page { display: none; }
    .page.active { display: block; }
    .section-head {
      display: flex; align-items: end; justify-content: space-between; gap: 12px;
      margin: 14px 2px 10px;
    }
    .section-head h2 { margin: 0; font-size: 17px; line-height: 1.25; }
    .section-head span { flex: 0 0 auto; color: var(--muted); font-size: 12px; }
    .match-list { display: grid; gap: 10px; }
    .match-card {
      width: 100%; border: 1px solid var(--line); border-radius: 8px; background: var(--panel);
      box-shadow: 0 8px 20px rgba(20, 31, 46, 0.06); overflow: hidden;
    }
    /* Flag circle (used standalone, not in v2 cards) */
    .flag {
      display: grid; place-items: center; flex: 0 0 auto; width: 32px; height: 32px;
      border-radius: 999px; background: #f8fafc; border: 1px solid var(--line); font-size: 19px;
    }
    .confidence {
      border-radius: 999px; padding: 4px 10px;
      font-size: 11px; line-height: 1; font-weight: 700; white-space: nowrap;
    }
    .confidence.high { background: var(--brand-soft); color: var(--brand); }
    .confidence.mid { background: var(--gold-soft); color: var(--gold); }
    .confidence.risk { background: var(--red-soft); color: var(--red); }
    .confidence.pending { background: #f1f5f9; color: #94a3b8; }
    .market-row {
      grid-column: 1 / -1; display: grid; grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px; margin-top: 2px;
    }
    .market {
      min-width: 0; border-radius: 8px; background: #f8fafc; border: 1px solid #e6ebf2;
      padding: 7px 8px;
    }
    .market span, .market b { display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .market span { color: var(--muted); font-size: 10px; line-height: 1.2; }
    .market b { margin-top: 3px; color: #263241; font-size: 12px; line-height: 1.25; }
    .report {
      display: none; border-top: 1px solid var(--line); padding: 0 12px 13px;
    }
    .match-card.open .report { display: block; }
    .report p { margin: 11px 0 10px; color: #374151; font-size: 13px; line-height: 1.65; }
    .report-tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag {
      min-height: 24px; display: inline-flex; align-items: center; padding: 0 8px;
      border-radius: 999px; background: #f1f5f9; color: #475569; font-size: 11px; font-weight: 700;
    }
    .data-grid {
      display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; margin-bottom: 10px;
    }
    .metric-card {
      min-height: 92px; border: 1px solid var(--line); border-radius: 8px; background: var(--panel);
      padding: 10px; display: flex; flex-direction: column; justify-content: space-between; overflow: hidden;
    }
    .metric-icon {
      width: 30px; height: 30px; border-radius: 8px; display: grid; place-items: center;
      font-size: 16px; line-height: 1;
    }
    .metric-card:nth-child(1) .metric-icon { background: var(--blue-soft); color: var(--blue); }
    .metric-card:nth-child(2) .metric-icon { background: var(--gold-soft); color: var(--gold); }
    .metric-card:nth-child(3) .metric-icon { background: var(--brand-soft); color: var(--brand); }
    .metric-card:nth-child(4) .metric-icon { background: #eef2ff; color: #4f46e5; }
    .metric-card:nth-child(5) .metric-icon { background: var(--red-soft); color: var(--red); }
    .metric-card:nth-child(6) .metric-icon { background: #f5f3ff; color: #7c3aed; }
    .metric-card b { display: block; margin-top: 8px; font-size: 18px; line-height: 1.1; font-variant-numeric: tabular-nums; }
    .metric-card span { display: block; margin-top: 5px; color: var(--muted); font-size: 11px; line-height: 1.25; }

    /* Article cards for 玄学 / 专题 tabs */
    .article-grid { display: grid; gap: 8px; margin-bottom: 12px; }
    .article-card {
      display: flex; align-items: center; gap: 12px; padding: 14px 12px;
      border: 1px solid var(--line); border-radius: 8px; background: var(--panel);
      text-decoration: none; color: inherit; cursor: pointer;
      box-shadow: 0 4px 12px rgba(20, 31, 46, 0.04);
    }
    .article-card:hover { border-color: var(--brand); }
    .article-icon {
      flex: 0 0 auto; width: 40px; height: 40px; border-radius: 10px;
      display: grid; place-items: center; font-size: 18px;
    }
    .article-icon.mystic { background: #f5f3ff; }
    .article-icon.simulation { background: #fff7ed; }
    .article-icon.research { background: var(--brand-soft); }
    .article-body { min-width: 0; flex: 1; }
    .article-body b { display: block; font-size: 14px; line-height: 1.3; }
    .article-body small { display: block; margin-top: 3px; color: var(--muted); font-size: 11px; }
    .article-arrow { color: var(--muted); font-size: 14px; }

    .bottom-nav {
      position: fixed; left: 50%; bottom: 0; z-index: 10;
      width: min(100%, 430px); transform: translateX(-50%);
      min-height: calc(var(--nav-h) + env(safe-area-inset-bottom));
      display: grid; grid-template-columns: repeat(4, minmax(0, 1fr));
      padding: 7px 4px calc(7px + env(safe-area-inset-bottom));
      border-top: 1px solid var(--line); background: rgba(255, 255, 255, 0.97);
      backdrop-filter: blur(14px);
    }
    .nav-item {
      border: 0; border-radius: 8px; background: transparent; color: #667085;
      min-width: 0; padding: 5px 2px; display: grid; justify-items: center; gap: 3px; cursor: pointer;
    }
    .nav-item svg { width: 20px; height: 20px; stroke-width: 2.2; }
    .nav-item span { display: block; max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 11px; line-height: 1.2; font-weight: 700; }
    .nav-item.active { color: var(--brand); background: var(--brand-soft); }

    /* Loading / empty */
    .empty-state { text-align: center; padding: 40px 16px; color: var(--muted); }
    .empty-state p { font-size: 14px; }

    /* Date strip: only visible on home tab */
    body:not([data-tab="home"]) .date-strip { display: none; }
    /* Make match-card a valid link */
    a.match-card { display: block; text-decoration: none; color: inherit; }
    a.match-card:hover { border-color: var(--brand); }
    a.match-card .match-summary { cursor: pointer; }

    @media (max-width: 360px) {
      .market-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="phone-shell">
    <header class="topbar">
      <div class="brand-row">
        <div class="brand-mark">FWC</div>
        <div class="brand-copy">
          <h1>世界杯赛前预测</h1>
          <p id="dateCaption">多维度分析</p>
        </div>
        <div class="live-chip" id="liveChip"><span class="live-dot"></span><span id="liveCount">0 场</span></div>
      </div>
      <div class="date-strip" id="dateStrip" aria-label="日期选择"></div>
    </header>

    <main>
      <!-- Tab: 首页 -->
      <div class="page active" id="page-home">
        <section aria-labelledby="scheduleTitle">
          <div class="section-head">
            <h2 id="scheduleTitle">赛程</h2>
            <span id="matchCount"></span>
          </div>
          <div class="match-list" id="matchList"></div>
        </section>
        <section aria-labelledby="dataTitle" style="margin-top:18px;">
          <div class="section-head">
            <h2 id="dataTitle">数据浏览</h2>
          </div>
          <div class="data-grid" id="dataGrid"></div>
        </section>
      </div>

      <!-- Tab: 预测（历史） -->
      <div class="page" id="page-predictions">
        <div class="section-head">
          <h2>历史预测</h2>
          <span id="historyCount">0 场</span>
        </div>
        <div class="match-list" id="historyList"></div>

      <!-- Tab: 推演 -->
      <div class="page" id="page-simulation">
        <div class="section-head">
          <h2>推演</h2>
          <span id="simulationCount">0 篇</span>
        </div>
        <div class="article-grid" id="simulationList"></div>
      </div>

      <!-- Tab: 玄学 -->
      <div class="page" id="page-mystic">
        <div class="section-head">
          <h2>玄学</h2>
          <span>1 篇</span>
        </div>
        <div class="article-grid" id="mysticList"></div>
      </div>

      <!-- Tab: 专题 -->
      <div class="page" id="page-research">
        <div class="section-head">
          <h2>专题</h2>
          <span id="researchCount">0 篇</span>
        </div>
        <div class="article-grid" id="researchList"></div>
      </div>
    </main>

    <nav class="bottom-nav" aria-label="底部导航">
      <button class="nav-item active" data-page="home" aria-label="首页">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
          <path d="M3 12l9-9 9 9"></path><path d="M5 10v10h14V10"></path>
        </svg><span>首页</span>
      </button>
      <button class="nav-item" data-page="predictions" aria-label="预测">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
          <path d="M4 19V5"></path><path d="M4 6h11l-1.5 3L15 12H4"></path>
        </svg><span>预测</span>
      </button>
      <button class="nav-item" data-page="simulation" aria-label="推演">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
          <circle cx="12" cy="12" r="3"/><path d="M12 1v4m0 14v4M1 12h4m14 0h4M4.2 4.2l2.8 2.8m10 10l2.8 2.8M4.2 19.8l2.8-2.8m10-10l2.8-2.8"/>
        </svg><span>推演</span>
      </button>
      <button class="nav-item" data-page="mystic" aria-label="玄学">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
          <path d="M12 3l1.8 5.2L19 10l-5.2 1.8L12 17l-1.8-5.2L5 10l5.2-1.8L12 3z"></path>
          <path d="M19 15l.8 2.2L22 18l-2.2.8L19 21l-.8-2.2L16 18l2.2-.8L19 15z"></path>
        </svg><span>玄学</span>
      </button>
      <button class="nav-item" data-page="research" aria-label="专题">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
          <path d="M5 4h14v16H5z"></path><path d="M8 8h8"></path><path d="M8 12h8"></path><path d="M8 16h5"></path>
        </svg><span>专题</span>
      </button>
    </nav>
  </div>

  <script>
  (function() {
    // ---- Adaptive team name font size (Chinese chars ~1em wide each) ----
    function teamFontSize(name) {
      const len = (name || '').replace(/[()（）·\-]/g, '').length;
      if (len <= 2) return 15;
      if (len <= 3) return 14;
      if (len <= 4) return 13;
      if (len <= 5) return 12;
      if (len <= 6) return 11;
      return 10;
    }

    // ---- Flag emoji map ----
    const FLAGS = {
      '阿根廷':'🇦🇷','奥地利':'🇦🇹','比利时':'🇧🇪','伊朗':'🇮🇷','哥伦比亚':'🇨🇴',
      '刚果(金)':'🇨🇩','埃及':'🇪🇬','新西兰':'🇳🇿','英格兰':'🏴','加纳':'🇬🇭',
      '法国':'🇫🇷','伊拉克':'🇮🇶','日本':'🇯🇵','乌拉圭':'🇺🇾','韩国':'🇰🇷',
      '捷克':'🇨🇿','葡萄牙':'🇵🇹','乌兹别克斯坦':'🇺🇿','挪威':'🇳🇴','塞内加尔':'🇸🇳',
      '约旦':'🇯🇴','阿尔及利亚':'🇩🇿','巴拿马':'🇵🇦','克罗地亚':'🇭🇷',
      '西班牙':'🇪🇸','沙特':'🇸🇦','德国':'🇩🇪','荷兰':'🇳🇱','瑞典':'🇸🇪',
      '意大利':'🇮🇹','巴西':'🇧🇷','墨西哥':'🇲🇽','美国':'🇺🇸','加拿大':'🇨🇦',
      '摩洛哥':'🇲🇦','突尼斯':'🇹🇳','喀麦隆':'🇨🇲','尼日利亚':'🇳🇬',
      '加蓬':'🇬🇦','马里':'🇲🇱','布基纳法索':'🇧🇫','科特迪瓦':'🇨🇮',
      '沙特阿拉伯':'🇸🇦','南非':'🇿🇦','塞尔维亚':'🇷🇸','瑞士':'🇨🇭',
      '丹麦':'🇩🇰','波兰':'🇵🇱','乌克兰':'🇺🇦','土耳其':'🇹🇷','希腊':'🇬🇷',
      '澳大利亚':'🇦🇺','秘鲁':'🇵🇪','智利':'🇨🇱','厄瓜多尔':'🇪🇨','巴拉圭':'🇵🇾',
      '俄罗斯':'🇷🇺','卡塔尔':'🇶🇦','阿联酋':'🇦🇪','中国':'🇨🇳',
      '冰岛':'🇮🇸','苏格兰':'🏴','威尔士':'🏴',
      '刚果(金)':'🇨🇩','佛得角':'🇨🇻','海地':'🇭🇹',
      '斯洛伐克':'🇸🇰','斯洛文尼亚':'🇸🇮','匈牙利':'🇭🇺',
      '罗马尼亚':'🇷🇴','保加利亚':'🇧🇬','爱尔兰':'🇮🇪','北爱尔兰':'🇬🇧',
      '挪威':'🇳🇴','芬兰':'🇫🇮','以色列':'🇮🇱','委内瑞拉':'🇻🇪',
      '玻利维亚':'🇧🇴','哥斯达黎加':'🇨🇷','洪都拉斯':'🇭🇳',
      '牙买加':'🇯🇲','特立尼达和多巴哥':'🇹🇹',
    };

    const WEEKDAYS = ['周日','周一','周二','周三','周四','周五','周六'];

    // ---- State ----
    let allMatches = [];
    let scheduleData = [];
    let dates = [];
    let currentDate = '';
    let currentTab = 'home';
    let touchStartX = 0;

    // ---- Parse match title: "阿根廷 vs 奥地利 J组" → {teamA, teamB, group} ----
    function parseTitle(title) {
      // Remove "预测" suffix (anywhere), " | ..." suffix, and trim
      let cleaned = title.replace(/预测/g,'').replace(/\s*\|.*$/,'').trim();
      // Try "A vs B X组"
      let m = cleaned.match(/^(.+?)\s*vs\s+(.+?)\s+([A-Z]组)$/);
      if (m) return { teamA: m[1].trim(), teamB: m[2].trim(), group: m[3] };
      // Try "A vs B"
      let m2 = cleaned.match(/^(.+?)\s*vs\s+(.+)$/);
      if (m2) return { teamA: m2[1].trim(), teamB: m2[2].trim(), group: '' };
      return { teamA: '?', teamB: '?', group: '' };
    }

    function teamFlag(name) { return FLAGS[name] || '🏳'; }

    // ---- Normalize team name for matching ----
    function normName(n) {
      return n.replace(/[\s·\-]/g,'').toLowerCase()
              .replace('沙特阿拉伯','沙特').replace('刚果(金)','刚果')
              .replace('刚果民主共和国','刚果').replace('佛得角','佛得角')
              .replace('乌兹别克斯坦','乌兹别克').replace('科特迪瓦','科特迪瓦');
    }

    // ---- Find prediction for a scheduled match ----
    function findPrediction(teamA, teamB) {
      const na = normName(teamA), nb = normName(teamB);
      for (const m of allMatches) {
        const p = parseTitle(m.title);
        const pa = normName(p.teamA), pb = normName(p.teamB);
        if ((pa.includes(na) || na.includes(pa)) && (pb.includes(nb) || nb.includes(pb))) return m;
        if ((pa.includes(nb) || nb.includes(pa)) && (pb.includes(na) || na.includes(pb))) return m;
      }
      return null;
    }

    // ---- Derive handicap & odds from probabilities ----
    function extractPct(s) {
      if (!s) return 0;
      const m = String(s).match(/(\d+\.?\d*)\s*%/);
      return m ? parseFloat(m[1]) : 0;
    }
    function deriveHandicap(aWin, draw, bWin) {
      const a = extractPct(aWin);
      const d = extractPct(draw);
      const b = extractPct(bWin);
      if (!a && !b) return { handicap: '—', oddsUp: '—', oddsDown: '—' };
      // implied probabilities → decimal odds (add 5% margin)
      const aOdds = a > 0 ? parseFloat((1 / (a/100 + 0.05)).toFixed(2)) : 99;
      const dOdds = d > 0 ? parseFloat((1 / (d/100 + 0.05)).toFixed(2)) : 99;
      const bOdds = b > 0 ? parseFloat((1 / (b/100 + 0.05)).toFixed(2)) : 99;
      // Determine handicap line and map to 上/下 odds
      let handicap, up, down;
      if (a >= 60) {
        handicap = '-0.75';
        up = aOdds; down = parseFloat((1 / (1 - a/100 + 0.05)).toFixed(2));
      } else if (a >= 50) {
        handicap = '-0.25';
        up = aOdds; down = parseFloat((1 / (1 - a/100 + 0.05)).toFixed(2));
      } else if (b >= 50) {
        handicap = '+0.25';
        down = bOdds; up = parseFloat((1 / (1 - b/100 + 0.05)).toFixed(2));
      } else if (b >= 40) {
        handicap = '+0.75';
        down = bOdds; up = parseFloat((1 / (1 - b/100 + 0.05)).toFixed(2));
      } else {
        handicap = '0';
        up = aOdds < bOdds ? aOdds : dOdds;
        down = up === aOdds ? bOdds : dOdds;
      }
      return { handicap, oddsUp: up, oddsDown: down };
    }

    // ---- Generate report summary ----
    function genSummary(parsed, match) {
      const { teamA, teamB } = parsed;
      const conf = match.confidence;
      const aW = extractPct(match.a_win);
      const bW = extractPct(match.b_win);
      const dW = extractPct(match.draw);
      if (!aW && !bW) return '数据收集中，暂无分析摘要。';
      if (aW >= 55) return `${teamA}胜率模型显著领先（${match.a_win}），${teamB}需依靠反击或定位球寻找突破口。`;
      if (bW >= 55) return `${teamB}在数据端更占优势（${match.b_win}），${teamA}需做好防守组织争取拿分。`;
      if (dW >= 30) return `双方实力接近，平局概率突出（${match.draw}）。比赛走势取决于临场发挥和关键对位。`;
      return `数据分析显示双方各有优势，${teamA}与${teamB}的较量预计胶着。`;
    }

    function genTags(parsed, match) {
      const tags = [];
      const aW = extractPct(match.a_win);
      const bW = extractPct(match.b_win);
      const dW = extractPct(match.draw);
      if (aW >= 55) tags.push('胜平负: 主胜');
      else if (bW >= 55) tags.push('胜平负: 客胜');
      else if (dW >= 30) tags.push('胜平负: 防平');
      else tags.push('胜平负: 均势');
      tags.push('大小球: 待定');
      if (match.confidence === '高') tags.push('置信: 高');
      return tags;
    }

    // ---- Confidence class ----
    function confClass(c) {
      if (c === '高') return 'high';
      if (c === '中') return 'mid';
      return 'risk';
    }

    // ---- Date helpers ----
    function dateLabel(d) {
      const dt = new Date(d + 'T00:00:00+08:00');
      const mm = dt.getMonth() + 1;
      const dd = dt.getDate();
      const wd = WEEKDAYS[dt.getDay()];
      return { short: `${mm}.${dd} ${wd}`, mmdd: `${mm}.${dd}` };
    }

    // ---- Beijing time helpers (UTC+8) ----
    function getBeijingDateStr() {
      const bjMs = Date.now() + 8 * 3600000;
      return new Date(bjMs).toISOString().slice(0, 10);
    }
    function getBeijingHour() {
      const bjMs = Date.now() + 8 * 3600000;
      return new Date(bjMs).getUTCHours(); // 0-23
    }

    function dateStatus(d) {
      const today = getBeijingDateStr();
      if (d === today) return '当前比赛日';
      if (d < today) return '已结束';
      return '下一比赛日';
    }

    // ---- Schedule noon auto-refresh ----
    function scheduleNoonRefresh() {
      const bjHour = getBeijingHour();
      const bjDate = getBeijingDateStr();
      // 12:00 Beijing = 04:00 UTC
      const noonUTC = new Date(bjDate + 'T04:00:00Z');
      if (bjHour >= 12) {
        // Already past noon today → schedule for tomorrow noon
        noonUTC.setUTCDate(noonUTC.getUTCDate() + 1);
      }
      const msUntilNoon = noonUTC.getTime() - Date.now();
      // Clamp to at least 1 second
      const delay = Math.max(1000, msUntilNoon);

      // Clear any existing timer
      if (window._noonTimer) clearTimeout(window._noonTimer);

      window._noonTimer = setTimeout(() => {
        loadData();
      }, delay);
    }

    // ---- Load schedule + predictions ----
    async function loadData() {
      // Load schedule.json (all matches, with or without predictions)
      try {
        const sResp = await fetch('schedule.json?nocache=' + Date.now());
        scheduleData = await sResp.json();
      } catch(e) {
        scheduleData = [];
      }

      // Load match_data.json (prediction data)
      try {
        const resp = await fetch('match_data.json?nocache=' + Date.now());
        allMatches = await resp.json();
      } catch(e) {
        allMatches = [];
      }

      // Load odds.json (real odds from OddsPapi)
      try {
        const oResp = await fetch('odds.json?nocache=' + Date.now());
        window._oddsMap = await oResp.json();
      } catch(e) {
        window._oddsMap = {};
      }

      // Build dates from schedule (primary source for dates)
      const dateMap = {};
      scheduleData.forEach(s => {
        if (!dateMap[s.date]) dateMap[s.date] = [];
        dateMap[s.date].push(s);
      });
      dates = Object.keys(dateMap).sort();
      window._dateMap = dateMap;
      window._scheduleMap = dateMap;

      // Beijing noon cutoff: before 12:00 → center=today; at/after 12:00 → center=tomorrow
      const bjDate = getBeijingDateStr();
      const bjHour = getBeijingHour();

      // Compute center date (Beijing time string)
      let centerDate;
      if (bjHour >= 12) {
        // Afternoon → center = tomorrow (Beijing)
        const bjTomorrow = new Date(Date.now() + 8 * 3600000 + 86400000);
        centerDate = bjTomorrow.toISOString().slice(0, 10);
      } else {
        // Morning → center = today (Beijing)
        centerDate = bjDate;
      }
      currentDate = dates.includes(centerDate) ? centerDate : (dates[dates.length-1] || centerDate);

      // Build strip dates safely using UTC parsing of the center date
      const [cy, cm, cd] = currentDate.split('-').map(Number);
      const centerAsUTC = new Date(Date.UTC(cy, cm - 1, cd));
      const stripDates = [];
      for (let i = -1; i <= 1; i++) {
        const d = new Date(centerAsUTC);
        d.setUTCDate(d.getUTCDate() + i);
        stripDates.push(d.toISOString().slice(0, 10));
      }
      window._stripDates = stripDates;

      renderDateStrip();
      renderMatches(currentDate);
      renderDataGrid();
      renderHistory();

      // Schedule next auto-refresh at noon Beijing time
      scheduleNoonRefresh();
    }

    function renderDateStrip() {
      const strip = document.getElementById('dateStrip');
      const stripDates = window._stripDates || dates.slice(-3);
      strip.innerHTML = stripDates.map(d => {
        const label = dateLabel(d);
        const status = dateStatus(d);
        const hasSchedule = (window._scheduleMap && window._scheduleMap[d]) ? 1 : 0;
        const statusText = hasSchedule ? (status + ' · ' + window._scheduleMap[d].length + '场') : '无赛程';
        const active = d === currentDate ? ' active' : '';
        return `<button class="date-pill${active}" data-date="${d}">
          <strong>${label.short}</strong><span>${statusText}</span>
        </button>`;
      }).join('');

      strip.querySelectorAll('.date-pill').forEach(btn => {
        btn.addEventListener('click', () => {
          currentDate = btn.dataset.date;
          renderDateStrip();
          renderMatches(currentDate);
        });
      });
    }

    function renderMatches(date) {
      const scheduleMap = window._scheduleMap || {};
      const daySchedule = scheduleMap[date] || [];
      const label = dateLabel(date);
      const status = dateStatus(date);
      const hasPred = daySchedule.filter(s => findPrediction(s.team_a, s.team_b)).length;

      document.getElementById('dateCaption').textContent = '多维度分析';
      document.getElementById('scheduleTitle').textContent = label.mmdd + ' 赛程';
      document.getElementById('matchCount').textContent = `${status} · ${daySchedule.length} 场 · ${hasPred} 有预测`;
      document.getElementById('liveCount').textContent = `${daySchedule.length} 场`;

      const list = document.getElementById('matchList');
      if (daySchedule.length === 0) {
        list.innerHTML = '<div class="empty-state"><p>暂无该日比赛数据</p></div>';
        return;
      }

      list.innerHTML = daySchedule.map((s, idx) => {
        const match = findPrediction(s.team_a, s.team_b);
        const hasPred = !!match;

        // Compute probabilities
        let probA = '—', probD = '—', probB = '—';
        if (hasPred) {
          const aw = extractPct(match.a_win);
          const dr = extractPct(match.draw);
          const bw = extractPct(match.b_win);
          const total = aw + dr + bw;
          if (total > 0) {
            probA = Math.round(aw / total * 100) + '%';
            probD = Math.round(dr / total * 100) + '%';
            probB = Math.round(bw / total * 100) + '%';
          }
        }

        // Try real odds from odds.json first
        const oddsKey = `${s.team_a} vs ${s.team_b}`;
        const realOdds = window._oddsMap && window._oddsMap[oddsKey];
        const hc = realOdds
          ? { handicap: realOdds.handicap, oddsUp: realOdds.odds_up, oddsDown: realOdds.odds_down }
          : (hasPred
            ? deriveHandicap(match.a_win || '0', match.draw || '0', match.b_win || '0')
            : { handicap: '—', oddsUp: '—', oddsDown: '—' });
        const scoreDisplay = hasPred && match.prediction
          ? (() => { const m = match.prediction.match(/(\d+)\s*[-:]\s*(\d+)/); return m ? m[1] + ' : ' + m[2] : '—'; })() : '—';
        const cc = hasPred ? confClass(match.confidence) : 'pending';

        if (hasPred) {
          return `<a class="match-card" href="${match.file}" target="_blank"
                  style="display:block;text-decoration:none;color:inherit;">
            <!-- Row 1: meta info (3-col, aligned with score row) -->
            <div style="display:grid;grid-template-columns:1fr auto 1fr;align-items:start;padding:11px 14px 0;">
              <span style="font-size:12px;font-weight:500;color:var(--ink);">${s.group} · ${s.round}</span>
              <span style="font-size:11px;color:var(--muted);text-align:center;">预测比分</span>
              <span style="font-size:11px;color:var(--muted);text-align:right;">开赛 ${s.time_bj || '—'} 北京</span>
            </div>
            <!-- Row 2: teams + score (flag on top, name below, vertical layout) -->
            <div style="display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:6px 8px 10px;">
              <div style="display:flex;flex-direction:column;align-items:center;gap:5px;min-width:0;">
                <span style="display:grid;place-items:center;width:38px;height:38px;border-radius:999px;background:#f8fafc;border:1px solid var(--line);font-size:22px;flex-shrink:0;">${teamFlag(s.team_a)}</span>
                <span style="font-size:${teamFontSize(s.team_a)}px;font-weight:600;text-align:center;line-height:1.2;word-break:keep-all;">${s.team_a}</span>
              </div>
              <div style="font-size:24px;font-weight:700;font-variant-numeric:tabular-nums;margin:0 8px;color:var(--ink);flex-shrink:0;text-align:center;min-width:44px;">${scoreDisplay}</div>
              <div style="display:flex;flex-direction:column;align-items:center;gap:5px;min-width:0;">
                <span style="display:grid;place-items:center;width:38px;height:38px;border-radius:999px;background:#f8fafc;border:1px solid var(--line);font-size:22px;flex-shrink:0;">${teamFlag(s.team_b)}</span>
                <span style="font-size:${teamFontSize(s.team_b)}px;font-weight:600;text-align:center;line-height:1.2;word-break:keep-all;">${s.team_b}</span>
              </div>
            </div>
            <div style="height:1px;background:var(--line);margin:0 14px;"></div>
            <!-- Row 3: confidence + probability -->
            <div style="display:flex;align-items:center;justify-content:center;gap:10px;padding:10px 14px;">
              <span class="confidence ${cc}" style="margin-top:0;">${match.confidence || '—'}置信</span>
              <span style="font-size:12px;color:#374151;">胜 <b style="font-weight:600;color:var(--ink);">${probA}</b></span>
              <span style="font-size:11px;color:#b0b8c4;">|</span>
              <span style="font-size:12px;color:#374151;">平 <b style="font-weight:600;color:var(--ink);">${probD}</b></span>
              <span style="font-size:11px;color:#b0b8c4;">|</span>
              <span style="font-size:12px;color:#374151;">胜 <b style="font-weight:600;color:var(--ink);">${probB}</b></span>
            </div>
            <div style="height:1px;background:var(--line);margin:0 14px;"></div>
            <!-- Row 4: handicap + odds -->
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:10px 14px 14px;">
              <div class="market">
                <span>参考让球盘</span><b>${hc.handicap}</b>
              </div>
              <div class="market">
                <span>参考赔率</span><b>${hc.oddsUp} (上) / ${hc.oddsDown} (下)</b>
              </div>
            </div>
          </a>`;
        } else {
          // Pending card (no prediction)
          return `<div class="match-card" style="display:block;">
            <!-- Row 1: meta -->
            <div style="display:grid;grid-template-columns:1fr auto 1fr;align-items:start;padding:11px 14px 0;">
              <span style="font-size:12px;font-weight:500;color:var(--ink);">${s.group} · ${s.round}</span>
              <span style="font-size:11px;color:var(--muted);text-align:center;">预测比分</span>
              <span style="font-size:11px;color:var(--muted);text-align:right;">开赛 ${s.time_bj || '—'} 北京</span>
            </div>
            <!-- Row 2: teams + pending (vertical flag+name) -->
            <div style="display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:6px 8px 10px;">
              <div style="display:flex;flex-direction:column;align-items:center;gap:5px;min-width:0;">
                <span style="display:grid;place-items:center;width:38px;height:38px;border-radius:999px;background:#f8fafc;border:1px solid var(--line);font-size:22px;flex-shrink:0;">${teamFlag(s.team_a)}</span>
                <span style="font-size:${teamFontSize(s.team_a)}px;font-weight:600;text-align:center;line-height:1.2;word-break:keep-all;">${s.team_a}</span>
              </div>
              <div style="font-size:16px;font-weight:600;margin:0 8px;color:var(--muted);flex-shrink:0;text-align:center;min-width:44px;">待发布</div>
              <div style="display:flex;flex-direction:column;align-items:center;gap:5px;min-width:0;">
                <span style="display:grid;place-items:center;width:38px;height:38px;border-radius:999px;background:#f8fafc;border:1px solid var(--line);font-size:22px;flex-shrink:0;">${teamFlag(s.team_b)}</span>
                <span style="font-size:${teamFontSize(s.team_b)}px;font-weight:600;text-align:center;line-height:1.2;word-break:keep-all;">${s.team_b}</span>
              </div>
            </div>
            <div style="height:1px;background:var(--line);margin:0 14px;"></div>
            <!-- Row 3: status -->
            <div style="display:flex;align-items:center;justify-content:center;padding:10px 14px;">
              <span class="confidence pending" style="margin-top:0;">预测制作中</span>
            </div>
          </div>`;
        }
      }).join('');
    }

    function renderDataGrid() {
      const grid = document.getElementById('dataGrid');
      const metrics = [
        { icon:'%', val:'72', label:'主预测命中指数' },
        { icon:'Σ', val:'66', label:'预测命中指数' },
        { icon:'★', val:'61', label:'玄学主预测命中' },
        { icon:'玄', val:'58', label:'玄学预测命中指数' },
        { icon:'冷', val:'43', label:'冷门预测命中指数' },
        { icon:'心', val:'75', label:'心水命中指数' },
      ];
      grid.innerHTML = metrics.map(m => `
        <button class="metric-card" type="button">
          <span class="metric-icon">${m.icon}</span>
          <span><b>${m.val}</b><span>${m.label}</span></span>
        </button>
      `).join('');
    }

    // ---- 历史预测（文章卡片样式） ----
    function renderHistory() {
      const list = document.getElementById('historyList');
      const today = getBeijingDateStr();

      // 按日期分组，仅过去日期
      const dateMap = {};
      allMatches.forEach(m => {
        if (m.date <= today) {
          if (!dateMap[m.date]) dateMap[m.date] = [];
          dateMap[m.date].push(m);
        }
      });
      const histDates = Object.keys(dateMap).sort().reverse();

      document.getElementById('historyCount').textContent =
        `${allMatches.filter(m => m.date <= today).length} 场`;

      if (histDates.length === 0) {
        list.innerHTML = '<div class="empty-state"><p>暂无历史预测数据</p></div>';
        return;
      }

      list.innerHTML = histDates.map(d => {
        const label = dateLabel(d);
        const dayMatches = dateMap[d];
        return `<div style="margin-bottom:18px;">
          <div class="section-head" style="margin-bottom:8px;">
            <h2 style="font-size:14px;">${label.mmdd} ${label.short.split(' ')[1] || ''}</h2>
            <span>${dayMatches.length} 场</span>
          </div>
          <div class="article-grid">
            ${dayMatches.map(m => {
              const parsed = parseTitle(m.title);
              return `<a class="article-card" href="${m.file}" target="_blank">
                <div class="article-icon research">📈</div>
                <div class="article-body">
                  <b>${parsed.teamA} vs ${parsed.teamB}</b>
                  <small>${parsed.group || ''} · ${d} · ${m.confidence || '—'}置信</small>
                </div>
                <div class="article-arrow">→</div>
              </a>`;
            }).join('')}
          </div>
        </div>`;
      }).join('');
    }

    // ---- Mystic articles ----
    function renderMystic() {
      const articles = [
        { file: '魔咒分析与冠军预测.html', title: '魔咒分析与冠军预测', desc: '基于历史规律的夺冠前瞻' },
      ];
      const list = document.getElementById('mysticList');
      list.innerHTML = articles.map(a => `
        <a class="article-card" href="articles/mystic/${encodeURI(a.file)}" target="_blank">
          <div class="article-icon mystic">🔮</div>
          <div class="article-body"><b>${a.title}</b><small>${a.desc}</small></div>
          <div class="article-arrow">→</div>
        </a>
      `).join('');
    }

    // ---- Simulation (Dixon-Coles Monte Carlo) ----
    function renderSimulation() {
      const articles = [
        { file: '2026-06-23_worldcup-dixon-coles-predictions.html', title: 'Dixon-Coles精算预测 6/23', desc: '蒙特卡洛10,000次模拟·4场推演' },
      ];
      document.getElementById('simulationCount').textContent = articles.length + ' 篇';
      document.getElementById('simulationList').innerHTML = articles.map(a => `
        <a class="article-card" href="articles/simulation/${encodeURI(a.file)}" target="_blank">
          <div class="article-icon simulation">🎲</div>
          <div class="article-body"><b>${a.title}</b><small>${a.desc}</small></div>
          <div class="article-arrow">→</div>
        </a>
      `).join('');
    }

    // ---- Research articles ----
    function renderResearch() {
      const articles = [
        { file:'2026世界杯主教练分析_报告一_AD组.html', title:'教练分析 I：AD组', desc:'主教练能力评估与战术哲学' },
        { file:'2026世界杯主教练分析_报告二_EH组.html', title:'教练分析 II：EH组', desc:'主教练能力评估与战术哲学' },
        { file:'2026世界杯主教练分析_报告三_IL组.html', title:'教练分析 III：IL组', desc:'主教练能力评估与战术哲学' },
        { file:'2026世界杯大小球分析.html', title:'大小球分析', desc:'2026世界杯大小球趋势预测' },
        { file:'大小球博彩分析.html', title:'大小球博彩分析', desc:'小组赛第一轮大小球博彩数据' },
        { file:'wc2026_blowout_prediction.html', title:'大比分预测', desc:'大比分高概率场次预测分析' },
        { file:'world_cup_blowout_analysis.md.html', title:'大比分历史分析', desc:'2018&2022世界杯大比分特征' },
        { file:'goal-forecast-2026-06-13.html', title:'进球预测', desc:'前五轮进球预测分析' },
        { file:'前3场进球历史数据.html', title:'前三场进球历史', desc:'世界杯前3场总进球数历史数据' },
        { file:'小组赛第一轮分析.html', title:'小组赛第一轮分析', desc:'小组赛第一轮数据分析报告' },
      ];
      document.getElementById('researchCount').textContent = articles.length + ' 篇';
      document.getElementById('researchList').innerHTML = articles.map(a => `
        <a class="article-card" href="articles/research/${encodeURI(a.file)}" target="_blank">
          <div class="article-icon research">📊</div>
          <div class="article-body"><b>${a.title}</b><small>${a.desc}</small></div>
          <div class="article-arrow">→</div>
        </a>
      `).join('');
    }

    // ---- Tab switching ----
    function switchTab(tab) {
      currentTab = tab;
      document.body.dataset.tab = tab;
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));

      const pageId = tab === 'home' ? 'page-home' : 'page-' + tab;
      const page = document.getElementById(pageId);
      if (page) page.classList.add('active');
      const nav = document.querySelector(`.nav-item[data-page="${tab}"]`);
      if (nav) nav.classList.add('active');

      // Render history when switching to predictions tab
      if (tab === 'predictions') renderHistory();

      window.location.hash = tab === 'home' ? '' : '#' + tab;
    }

    // ---- Init ----
    document.querySelectorAll('.nav-item').forEach(item => {
      item.addEventListener('click', () => switchTab(item.dataset.page));
    });

    // Date strip swipe
    const dateStrip = document.getElementById('dateStrip');
    dateStrip.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
    dateStrip.addEventListener('touchend', e => {
      const delta = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(delta) < 34) return;
      const stripDates = window._stripDates || dates;
      const curIdx = stripDates.indexOf(currentDate);
      const dir = delta < 0 ? 1 : -1;
      const nextIdx = Math.max(0, Math.min(stripDates.length - 1, curIdx + dir));
      if (nextIdx !== curIdx) {
        currentDate = stripDates[nextIdx];
        renderDateStrip();
        renderMatches(currentDate);
      }
    });

    // Hash routing
    function handleHash() {
      const hash = window.location.hash.replace('#', '');
      if (hash === 'predictions' || hash === 'mystic' || hash === 'simulation' || hash === 'research') {
        switchTab(hash);
      }
    }
    window.addEventListener('hashchange', handleHash);

    // Start
    renderMystic();
    renderSimulation();
    renderResearch();
    loadData().then(() => handleHash());
  })();
  </script>
</body>
